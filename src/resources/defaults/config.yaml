# Default Hermes config (mirrors ~/.hermes/config.yaml)
model: anthropic/claude-sonnet-4
max_turns: 120
toolsets: [hermes-cli]

platform_toolsets:
  cli: [web, browser, terminal, file, code_execution, vision, image_gen, tts, skills, todo, memory, session_search, clarify, delegation, cronjob]
  telegram: [hermes-telegram]
  discord: [hermes-discord]

terminal:
  backend: local
  cwd: .
  timeout: 180
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true

browser:
  inactivity_timeout: 120
  record_sessions: false

display:
  compact: false
  personality: kawaii
  resume_display: full

compression:
  enabled: true
  threshold: 0.85
  summary_model: google/gemini-3-flash-preview
  summary_provider: auto

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

timezone: UTC
